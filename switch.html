<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Switch Case Example</h1>
    <script>
        let mark = prompt("Enter the marks: ", '');
        switch (true){
            case '' || ' ':
                alert("Please enter your marks");
                break;
            case 'a' || 'b' || 'c':
                alert("Enter only in numbers");
                break;   
            case mark<=100 && mark>=90:
                alert ("Grade A");
                break;
            case mark<90 && mark>=70:
                alert ("Grade B");
                break;
            case mark<70 && mark>=50:
                alert ("Grade C");
                break;
            case mark<50 && mark>=0:
                alert ("Grade D");
                break;
            default:
                alert ("Mark should be 100");
        }
    </script>
    
</body>
</html>
