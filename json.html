<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin-top:200px;
            margin-left: 600px;
            font-size:xx-large;
        }
    </style>
</head>
<body>
    
    <div>
        <h1>For of & For in</h1>
        <table border="1" rules="all" id="jsonCheck"></table>
    </div>
    <div>
        <h1>For Each</h1>
        <p id="forex"></p>
    </div>
    <div>
        <h1>Map</h1>
        <p id="mapex"></p>
    </div>
    <script>
        let text = "";
        var forExa = document.getElementById("jsonCheck");
        var jsonTable = document.getElementById("forex");
        var mapExa = document.getElementById("mapex");

        var tableCont = ["BMI","Classification", "Health Risk"];

        tableCont.forEach(forExample);
        mapOut = tableCont.map(i => {
            var mapOutput = " " + i
            return mapOutput
        })
        mapExa.innerHTML = mapOut;


        const user = {
            bmi: "<18",
            classification:"Under weight",
            healthrisk:"minimal"
        }   
        var createTab = "<thead><tr>";
            for (i of tableCont){
                createTab += "<th>" + i + "</th>";
            } 
            createTab += "</tr></thead><tbody><tr>";
            for (i in user){
                createTab += "<td>" +user[i]+ "</td>";
            }
            function forExample(item, index){
                text += index + " :" + item + "<br>";

            }
            
            createTab += "</tr></tbody>";
            forExa.innerHTML = createTab;

            jsonTable.innerHTML = text;
    </script>
</body>
</html>
