<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Object Creation and Iteration</h1>
    <div id="objCr"></div>
    <script>
        var objCreate = document.getElementById("objCr");
        var objExample = document.getElementById("objEx");

        //Object Creation
        var objCreation = {
            Name : "Nivetha",
            Age : 26,
            Location : "Theni",
            Address : "Something"
        }

        var objCreat = "";
        //Display the Object keys and values in loop
        for (i in objCreation){
            objCreat += i + " : " + objCreation[i] + "<br>";
        }
        objCreate.innerHTML = objCreat;


        //Adding property
        objCreation.surname = "K";
        console.log(objCreation);

        //Change the value
        objCreation.surname = "Karuppaiah";
        console.log(objCreation);

        //delete the property
        delete objCreation.surname;
        console.log(objCreation);

        


    </script>
    
</body>
</html>
