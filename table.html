<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>   
    <label> Enter the column size:</label>
    <input type="number" id="column"><br><br>
    <label> Enter the row size:</label>
    <input type="number" id="rows">
    <button onclick="tableCreate()">Calculate</button><br><br>
    <div id="tablecontent"></div>
    <script>
        function tableCreate(){
        var colCo = document.getElementById ("column").value;
        var rowCo = document.getElementById ("rows").value;
        var tablll = document.getElementById ("tablecontent");
        var finalTable = "<table border='1' rule='all'>";
        for (var i=1; i<=rowCo;i++){
            finalTable += "<tr>";
                for (var j=1; j<=colCo; j++){
                    finalTable += "<td>"+"Table"+"</td>";
                }
            finalTable += "</tr>";
        }
        finalTable += "</table>";
            return tablll.innerHTML = finalTable;
    }
    </script>
</body>
</html>
